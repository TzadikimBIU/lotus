name: smoke-windows

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        profile:
          - minimal
          - systems
          - proofs

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce
        id: setup-chrome

      - name: Install Z3 Prover on Windows Host
        if: matrix.profile == 'proofs'
        run: choco install z3 -y

      - name: Fetch vault branch
        run: git fetch --depth=1 origin vault:vault

      - run: npm ci --legacy-peer-deps

      - name: Run native smoke profile
        shell: powershell
        run: |
          $env:LOTUS_CHROME_PATH = "${{ steps.setup-chrome.outputs.chrome-path }}"
          npm run smoke -- --profile ${{ matrix.profile }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: lotus-smoke-windows-artifacts-${{ matrix.profile }}
          path: .lotus/artifacts/smoke/${{ matrix.profile }}
